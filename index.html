<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milenarts Ateliê</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #FDF6EF;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 3rem;
      font-family: 'DM Sans', sans-serif;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4826A, #C9A87C);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #fff;
      margin-bottom: 1rem;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(180,110,80,0.18);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #3B2314;
      margin-bottom: 4px;
      text-align: center;
    }

    .tagline {
      font-size: 13px;
      color: #8A6A55;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 6px;
    }

    .location {
      font-size: 12px;
      color: #B5917A;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.8rem;
      max-width: 360px;
    }

    .tag {
      font-size: 11px;
      color: #9C7060;
      background: #F5E8DC;
      border-radius: 20px;
      padding: 4px 12px;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: #D4A882;
      border-radius: 2px;
      margin-bottom: 1.8rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 360px;
      padding: 14px 20px;
      border-radius: 14px;
      border: 1.5px solid;
      cursor: pointer;
      margin-bottom: 12px;
      text-decoration: none;
      background: #fff;
      transition: transform 0.15s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-text { flex: 1; }

    .btn-label {
      font-size: 13px;
      font-weight: 500;
      display: block;
    }

    .btn-sub {
      font-size: 11px;
      font-weight: 300;
      display: block;
      margin-top: 1px;
    }

    .btn-arrow { font-size: 16px; opacity: 0.35; }

    .btn-wa { border-color: #C8E6C9; }
    .btn-wa .btn-icon { background: #E8F5E9; }
    .btn-wa .btn-label { color: #2E7D32; }
    .btn-wa .btn-sub { color: #81C784; }

    .btn-ig { border-color: #F8D7E3; }
    .btn-ig .btn-icon { background: #FDE8F0; }
    .btn-ig .btn-label { color: #AD1457; }
    .btn-ig .btn-sub { color: #F48FB1; }

    .footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: #C5A899;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
